name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP Syntax Check
        run: |
          FAILED=0
          while IFS= read -r f; do
            if ! php -l "$f" > /dev/null 2>&1; then
              echo "::error file=$f::PHP syntax error"
              php -l "$f"
              FAILED=1
            fi
          done < <(find . -name '*.php' -not -path './vendor/*' -not -path './backups/*' -not -path './node_modules/*')
          exit $FAILED

  deploy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ ! -s ~/.ssh/deploy_key ]; then echo "::error::HOSTINGER_SSH_KEY secret is empty"; exit 1; fi
          ssh-keyscan -p 65002 -T 10 62.72.37.195 >> ~/.ssh/known_hosts 2>&1 || true

      - name: Sync scraper-proxy keys to server
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          IPROYAL_PROXIES: ${{ secrets.IPROYAL_PROXIES }}
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
          BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE }}
        run: |
          if [ -n "$APIFY_API_TOKEN" ]; then
            cat > /tmp/apify-keys.php <<EOF
          <?php
          if (!defined('APIFY_API_TOKEN')) define('APIFY_API_TOKEN', '$APIFY_API_TOKEN');
          EOF
            scp -i ~/.ssh/deploy_key -P 65002 -o StrictHostKeyChecking=no /tmp/apify-keys.php \
              u860899303@62.72.37.195:/home/u860899303/domains/app.fleckfrei.de/public_html/includes/apify-keys.php
            echo "✓ apify-keys.php synced"
          fi

          if [ -n "$IPROYAL_PROXIES" ]; then
            # IPROYAL_PROXIES secret holds a JSON array
            printf "<?php\nif (!defined('IPROYAL_PROXIES')) define('IPROYAL_PROXIES', %s);\n" "'$IPROYAL_PROXIES'" > /tmp/iproyal-keys.php
            scp -i ~/.ssh/deploy_key -P 65002 -o StrictHostKeyChecking=no /tmp/iproyal-keys.php \
              u860899303@62.72.37.195:/home/u860899303/domains/app.fleckfrei.de/public_html/includes/iproyal-keys.php
            echo "✓ iproyal-keys.php synced"
          fi

          if [ -n "$BRIGHTDATA_API_KEY" ]; then
            cat > /tmp/brightdata-keys.php <<EOF
          <?php
          if (!defined('BRIGHTDATA_API_KEY')) define('BRIGHTDATA_API_KEY', '$BRIGHTDATA_API_KEY');
          if (!defined('BRIGHTDATA_ZONE')) define('BRIGHTDATA_ZONE', '${BRIGHTDATA_ZONE:-n8n_unblocker}');
          EOF
            scp -i ~/.ssh/deploy_key -P 65002 -o StrictHostKeyChecking=no /tmp/brightdata-keys.php \
              u860899303@62.72.37.195:/home/u860899303/domains/app.fleckfrei.de/public_html/includes/brightdata-keys.php
            echo "✓ brightdata-keys.php synced"
          fi

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='backups/' \
            --exclude='docs/' \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='*.md' \
            --exclude='uploads/' \
            --exclude='includes/stripe-keys.php' \
            --exclude='includes/llm-keys.php' \
            --exclude='includes/google-keys.php' \
            --exclude='includes/paypal-keys.php' \
            --exclude='includes/telegram-keys.php' \
            --exclude='includes/apify-keys.php' \
            --exclude='includes/iproyal-keys.php' \
            --exclude='includes/brightdata-keys.php' \
            -e "ssh -i ~/.ssh/deploy_key -p 65002" \
            ./ u860899303@62.72.37.195:/home/u860899303/domains/app.fleckfrei.de/public_html/

      - name: Post-deploy health check
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.fleckfrei.de/api/health.php?key=flk_health_2026_c9a3f1e7d4b2)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed: HTTP $STATUS"

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          if [ "$STATUS" != "success" ]; then EMOJI="❌"; fi
          COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          MSG="$EMOJI <b>Deploy $STATUS</b>%0A%0A📦 Commit: $COMMIT%0A👤 ${{ github.actor }}%0A📝 $(echo '${{ github.event.head_commit.message }}' | head -1 | sed 's/&/&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')"
          curl -s "https://api.telegram.org/bot***REDACTED***/sendMessage" \
            -d "chat_id=6904792507&text=$MSG&parse_mode=HTML" > /dev/null
