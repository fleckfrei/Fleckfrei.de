<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Offline — Fleckfrei</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f9fafb; color: #1a1a1a;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: white; border-radius: 16px; border: 1px solid #e5e7eb; padding: 48px 32px;
            text-align: center; max-width: 400px; width: 100%; }
    .icon { width: 64px; height: 64px; border-radius: 16px; background: #2E7D6B; color: white;
            display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700;
            margin: 0 auto 20px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { color: #6b7280; font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
    button { background: #2E7D6B; color: white; border: none; padding: 12px 24px; border-radius: 12px;
             font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
    button:active { opacity: 0.8; }
    .status { margin-top: 16px; font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">F</div>
    <h1>Keine Verbindung</h1>
    <p>Du bist offline. Sobald du wieder Internet hast, wird die Seite automatisch neu laden.</p>
    <button onclick="location.reload()">Erneut versuchen</button>
    <div class="status" id="status">Warte auf Verbindung...</div>
  </div>
  <script>
    window.addEventListener('online', () => location.reload());
    if (navigator.onLine) location.reload();
    setInterval(() => {
      document.getElementById('status').textContent = navigator.onLine ? 'Verbunden! Lade...' : 'Offline seit ' + new Date().toLocaleTimeString('de');
    }, 3000);
  </script>
</body>
</html>
